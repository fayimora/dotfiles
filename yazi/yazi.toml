# Yazi configuration
#
# This is a starter scaffold so the file is tracked in dotfiles without
# changing Yazi's behavior yet. Uncomment and tune settings as needed.
#
# Docs: https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
show_hidden = true
# sort_by = "natural"
# sort_reverse = false
sort_dir_first = true
# linemode = "none"
# show_symlink = true
scrolloff = 5

# [preview]
# tab_size = 2
# max_width = 1800
# max_height = 2400

# [tasks]
# micro_workers = 5
# macro_workers = 10
# bizarre_retry = 5

# Show Git status in Yazi's file list via yazi-rs/plugins:git.
[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
